name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: Atom-SignalLab
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: Atom-SignalLab
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/Atom-Classifier
          # reference-iq.test.ts verifies the reference waveforms against the
          # SAME blind recovery the Atomizer app runs (a zero-dependency module
          # imported from this exact pinned commit); do not silently follow a
          # moving default branch. Public repo, so the default token suffices.
          ref: 4e281ff9ce7d4444bb941f81de793c48ad6634ec
          path: Atom-Classifier
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: Atom-SignalLab/.node-version
          cache: npm
          cache-dependency-path: Atom-SignalLab/package-lock.json
      - run: npm install --global npm@10.9.8
      - name: Verify toolchain
        shell: bash
        run: |
          test "$(node --version)" = "v$(cat .node-version)"
          test "$(npm --version)" = "10.9.8"
      - run: npm ci && npm run check
      - run: npm run audit
